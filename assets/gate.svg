<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="525" viewBox="0 0 1200 525" role="img" aria-label="pub-check validation flow from work product through 91 grouped checks to publishable or blocker verdicts">
  <defs>
    <marker id="arrow-gate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a86e8"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="1198" height="523" rx="14" fill="#f5f8fe" stroke="#d7e2f6" stroke-width="1"/>

  <text x="50" y="50" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="700" fill="#1f2a44">pub-check: Validation Flow</text>
  <text x="50" y="82" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#5b6b8c">One stdlib Python file. Every check traces to a real correction round. No separate configuration: authority is derived from the package itself.</text>

  <rect x="50" y="200" width="205" height="150" rx="12" fill="#ffffff" stroke="#4a86e8" stroke-width="2"/>
  <text x="75" y="234" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#1f2a44">Work Product</text>
  <text x="75" y="266" font-family="SFMono-Regular, Consolas, Menlo, monospace" font-size="14" fill="#44536e">spec-vX.Y-csdNN.md</text>
  <text x="75" y="291" font-family="SFMono-Regular, Consolas, Menlo, monospace" font-size="14" fill="#44536e">+ .html + .pdf</text>
  <text x="75" y="316" font-family="SFMono-Regular, Consolas, Menlo, monospace" font-size="14" fill="#44536e">schema/*.json</text>
  <text x="75" y="341" font-family="SFMono-Regular, Consolas, Menlo, monospace" font-size="14" fill="#44536e">manifest.json</text>

  <line x1="255" y1="275" x2="278" y2="275" stroke="#4a86e8" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow-gate)"/>

  <rect x="285" y="105" width="635" height="390" rx="14" fill="#ffffff" stroke="#d7e2f6" stroke-width="1"/>
  <text x="310" y="139" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#1f2a44">92 checks in 34 classes, grouped</text>

  <rect x="310" y="160" width="290" height="62" rx="10" fill="#eef4ff"/>
  <text x="322" y="184" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#446CAA">Template and Policy</text>
  <text x="322" y="207" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#44536e">sections, order, Conformance, RFC 2119</text>
  <rect x="620" y="160" width="290" height="62" rx="10" fill="#eef4ff"/>
  <text x="632" y="184" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#446CAA">Front Matter and Links</text>
  <text x="632" y="207" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#44536e">This/Latest URLs, anchors, link targets</text>
  <rect x="310" y="236" width="290" height="62" rx="10" fill="#eef4ff"/>
  <text x="322" y="260" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#446CAA">Residue and Naming</text>
  <text x="322" y="283" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#44536e">TODO/tbd, draft files, case, versions</text>
  <rect x="620" y="236" width="290" height="62" rx="10" fill="#eef4ff"/>
  <text x="632" y="260" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#446CAA">Cross-Format Sync</text>
  <text x="632" y="283" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#44536e">PDF sync, dates, fonts, autolink trap</text>
  <rect x="310" y="312" width="290" height="62" rx="10" fill="#eef4ff"/>
  <text x="322" y="336" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#446CAA">Schemas and References</text>
  <text x="322" y="359" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#44536e">$id vs path, cited files, dead lists</text>
  <rect x="620" y="312" width="290" height="62" rx="10" fill="#eef4ff"/>
  <text x="632" y="336" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#446CAA">Hygiene and Fidelity</text>
  <text x="632" y="359" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#44536e">junk, symlinks, sha256, Word render</text>

  <text x="310" y="426" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5b6b8c">Code fences and pre/code content are excluded from prose checks.</text>
  <text x="310" y="449" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5b6b8c">Track-aware: DOCX-native packages skip Markdown-only checks and gain render-fidelity checks.</text>

  <path d="M 920 275 H 935 V 220 H 950" fill="none" stroke="#4a86e8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-gate)"/>
  <path d="M 935 275 V 370 H 950" fill="none" stroke="#4a86e8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-gate)"/>

  <rect x="950" y="165" width="210" height="110" rx="12" fill="#eef9f0" stroke="#2f6b3c" stroke-width="2"/>
  <text x="966" y="198" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#2f6b3c">exit 0 &#183; Publishable</text>
  <text x="966" y="229" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#2f6b3c">No resubmission cycle:</text>
  <text x="966" y="251" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#2f6b3c">intake verifies and publishes</text>

  <rect x="950" y="315" width="210" height="110" rx="12" fill="#fdf0f0" stroke="#b04a4a" stroke-width="2"/>
  <text x="966" y="348" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#a03535">exit 1 &#183; Blockers</text>
  <text x="966" y="379" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#a03535">Resolve blockers</text>
  <text x="966" y="401" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#a03535">before the vote</text>
</svg>
