<text x="700.0" y="68" font-family="Arial, Helvetica, sans-serif" font-size="13.5" font-weight="normal" fill="#4A6076" text-anchor="middle">One validation engine (pub-check) runs on both sides; the human audit wraps it with gates the tool cannot see</text>
