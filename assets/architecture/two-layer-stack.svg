<circle cx="520" cy="520" r="3.4" fill="#1B3A5C"/><text x="534" y="524" font-family="Arial, Helvetica, sans-serif" font-size="11.5" font-weight="normal" fill="#243B4F" text-anchor="start">the four destinations</text>
<circle cx="520" cy="544" r="3.4" fill="#1B3A5C"/><text x="534" y="548" font-family="Arial, Helvetica, sans-serif" font-size="11.5" font-weight="normal" fill="#243B4F" text-anchor="start">the rendered page</text>
<circle cx="520" cy="568" r="3.4" fill="#1B3A5C"/><text x="534" y="572" font-family="Arial, Helvetica, sans-serif" font-size="11.5" font-weight="normal" fill="#243B4F" text-anchor="start">an adversary set to refute it</text>
<text x="450" y="668" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="normal" fill="#4A6076" text-anchor="middle">Gate 4b requires running pub-check and triaging every finding.</text>
