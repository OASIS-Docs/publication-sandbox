<circle cx="98" cy="532" r="3.4" fill="#1B3A5C"/><text x="112" y="536" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="normal" fill="#243B4F" text-anchor="start">Zip integrity</text>
<circle cx="98" cy="559" r="3.4" fill="#1B3A5C"/><text x="112" y="563" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="normal" fill="#243B4F" text-anchor="start">Four announcement channels at destination</text>
<circle cx="98" cy="586" r="3.4" fill="#1B3A5C"/><text x="112" y="590" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="normal" fill="#243B4F" text-anchor="start">TCADMIN ticket record</text>
<circle cx="98" cy="613" r="3.4" fill="#1B3A5C"/><text x="112" y="617" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="normal" fill="#243B4F" text-anchor="start">Independent adversarial verifier (refute mandate)</text>
