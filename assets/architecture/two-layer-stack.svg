<text x="95" y="808" font-family="Arial, Helvetica, sans-serif" font-size="13.5" font-weight="bold" fill="#1B3A5C" text-anchor="start">pub_check.py:  92 checks across 34 classes</text>
<text x="95" y="832" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="normal" fill="#4A6076" text-anchor="start">Runs in the TC's own CI before submission.</text>
