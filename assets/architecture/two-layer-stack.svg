<text x="514" y="843" font-family="Arial, Helvetica, sans-serif" font-size="11.5" font-weight="normal" fill="#243B4F" text-anchor="start">filenames  ·  case  ·  front matter</text>
<text x="514" y="863" font-family="Arial, Helvetica, sans-serif" font-size="11.5" font-weight="normal" fill="#243B4F" text-anchor="start">anchors  ·  fonts  ·  placeholders</text>
<text x="514" y="883" font-family="Arial, Helvetica, sans-serif" font-size="11.5" font-weight="normal" fill="#243B4F" text-anchor="start">schema $id  ·  stage naming</text>
<text x="514" y="903" font-family="Arial, Helvetica, sans-serif" font-size="11.5" font-weight="normal" fill="#243B4F" text-anchor="start">image policy  ·  junk files</text>
