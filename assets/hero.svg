<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="250" viewBox="0 0 1200 250" role="img" aria-label="OASIS Docs Publication Sandbox hero: Markdown to HTML to PDF publication pipeline with pub-check validation">
  <defs>
    <marker id="arrow-hero" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a86e8"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="1198" height="248" rx="14" fill="#f5f8fe" stroke="#d7e2f6" stroke-width="1"/>

  <text x="60" y="66" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#1f2a44">OASIS Docs Publication Sandbox</text>
  <text x="60" y="104" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#44536e">Markdown &#8594; HTML &#8594; PDF publication pipeline,</text>
  <text x="60" y="132" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#44536e">with pre-submission validation (pub-check)</text>
  <text x="60" y="178" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#5b6b8c">Michael Coletta &#183; Technical Advisor, OASIS Open</text>

  <rect x="760" y="58" width="100" height="52" rx="10" fill="#ffffff" stroke="#4a86e8" stroke-width="2"/>
  <text x="810" y="91" text-anchor="middle" font-family="SFMono-Regular, Consolas, Menlo, monospace" font-size="20" font-weight="700" fill="#1f2a44">.md</text>

  <line x1="872" y1="84" x2="898" y2="84" stroke="#4a86e8" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow-hero)"/>

  <rect x="910" y="58" width="100" height="52" rx="10" fill="#ffffff" stroke="#4a86e8" stroke-width="2"/>
  <text x="960" y="91" text-anchor="middle" font-family="SFMono-Regular, Consolas, Menlo, monospace" font-size="20" font-weight="700" fill="#1f2a44">.html</text>

  <line x1="1022" y1="84" x2="1048" y2="84" stroke="#4a86e8" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow-hero)"/>

  <rect x="1060" y="58" width="100" height="52" rx="10" fill="#ffffff" stroke="#4a86e8" stroke-width="2"/>
  <text x="1110" y="91" text-anchor="middle" font-family="SFMono-Regular, Consolas, Menlo, monospace" font-size="20" font-weight="700" fill="#1f2a44">.pdf</text>

  <rect x="760" y="148" width="400" height="48" rx="10" fill="#eef9f0" stroke="#2f6b3c" stroke-width="2"/>
  <text x="960" y="178" text-anchor="middle" font-family="SFMono-Regular, Consolas, Menlo, monospace" font-size="15" font-weight="700" fill="#2f6b3c">pub-check &#183; 92 checks &#183; exit 0 = publish</text>
</svg>
